<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Restaurant</title>
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8dGhhaSUyMHJlc3RhdXJhbnR8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
        alt="header-img"" style=" width: 70%; display: block; margin: 0 auto;">
    <h1 style="text-align: center;">Thai Restaurant</h1>
    <style>
        .navbar {
            text-align: center;
            margin: 20px 0;
        }

        .navbar p {
            display: inline-block;
            margin: 0 20px;
        }

        .navbar a {
            font-size: 24px;
            text-decoration: none;
            color: rgb(21, 132, 151);
            font-weight: bold;
        }

        .navbar a:hover {
            color: orange;
        }

        .order a {
            font-size: 17px;
            text-decoration: none;
            color: rgb(21, 132, 151);
            font-weight: bold;
        }

        .order a:hover {
            color: orange;
        }
    </style>

    <div class="navbar">
        <p><a href="#heading-1">Menu</a></p>
        <p><a href="#heading-2">Order Form</a></p>
    </div>
</head>

<body>
    <header>
        <main>
            <section id="#heading-1">
                <h2 id="#heading-1">Menu</h2>
                <article>
                    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8dGhhaSUyMHJlc3RhdXJhbnR8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
                        alt="pad-thai" style="width: 40%; height: auto;">
                    <h3>Pad Thai</h3>
                    <div class="order">
                        <h4><i> Price: $12</i> <a href="#heading-2">Order Now</a></h4>
                    </div>
                    <h2 id="#heading-1">Menu</h2>
                    <article>
                        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8dGhhaSUyMHJlc3RhdXJhbnR8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60"
                            alt="pad-thai" style="width: 40%; height: auto;">
                        <h3>Pad Thai</h3>
                        <div class="order">
                            <h4><i> Price: $12</i> <a href="#heading-2">Order Now</a></h4>
                        </div>
                    </article>
            </section>
            <form id="#heading-2">
                <h2 id="#heading-2">Order Form</h2>
                <label for="name">ชื่อผู้สั่ง:</label>
                <input type="text" id="name" name="name" required><br><br>
                <label for="dish">เมนูที่สั่ง:</label>
                <input type="text" id="dish" name="dish" required> <label for="quantity">จำนวน:</label> <input
                    type="number" id="quantity" name="quantity" min="0" max="10" required><br><br>
                <label for="address">ที่อยู่จัดส่ง:</label>
                <textarea id="address" name="address" required></textarea><br><br>
                <labe for="payment">ยืนยันการชำระเงิน:</label>
                    <input type="checkbox" id="payment" name="payment" required> ชำระเงินแล้ว<br><br>
                    <input type="submit" value="ยืนยันการสั่งซื้อ">
            </form>

    </header>
</body>
<p>สร้างสรรค์ด้วยความรักโดย James</p>

</html>
